      // Single Page App redirect handler for GitHub Pages
      // Restores the path from the query string set by 404.html
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')

            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
