<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/rq-zen-app/icon.svg" />
    <link rel="manifest" href="/rq-zen-app/manifest.json" />
    <link rel="apple-touch-icon" href="/rq-zen-app/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Zen Space</title>
    <script>
      // One-time nuke: unregister ALL service workers, clear caches, reload
      if ('serviceWorker' in navigator) {
        var swNuked = sessionStorage.getItem('sw_nuked');
        if (!swNuked) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            var had = regs.length > 0;
            var tasks = regs.map(function(r) { return r.unregister(); });
            if ('caches' in window) {
              tasks.push(caches.keys().then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              }));
            }
            Promise.all(tasks).then(function() {
              sessionStorage.setItem('sw_nuked', '1');
              if (had) location.reload();
            });
          });
        }
      }
      // Single Page App redirect handler for GitHub Pages
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
